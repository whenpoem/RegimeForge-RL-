name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend package
        working-directory: backend
        run: python -m pip install --upgrade pip && python -m pip install -e .

      - name: Compile package
        run: python -m compileall backend/regime_lens

      - name: Import smoke test
        run: python -c "import regime_lens; import regime_lens.tui; import regime_lens.run_experiments"

      - name: Experiment planning smoke test
        run: python -m regime_lens.run_experiments plan --suite smoke
